<!DOCTYPE html>
<html>
<body>
    <h2>Ví dụ đi chợ: Chỉ dùng IF</h2>

    <script>
        // Giả sử: coDuaHau là đúng (true)
        let coDuaHau = true; 

        if (coDuaHau) {
            alert("Con đã mua dưa hấu mang về!");
        }

        alert("Con đã đi chợ xong.");
    </script>
</body>
</html>
